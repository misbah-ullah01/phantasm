name: PHANTASM CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  DOCKER_BLUE_IMAGE: ${{ secrets.DOCKER_USERNAME }}/phantasm-blue
  DOCKER_GREEN_IMAGE: ${{ secrets.DOCKER_USERNAME }}/phantasm-green

jobs:
  build-and-push:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Blue image
        uses: docker/build-push-action@v5
        with:
          context: ./app/v1
          push: true
          tags: |
            ${{ env.DOCKER_BLUE_IMAGE }}:latest
            ${{ env.DOCKER_BLUE_IMAGE }}:${{ github.sha }}

      - name: Build and push Green image
        uses: docker/build-push-action@v5
        with:
          context: ./app/v2
          push: true
          tags: |
            ${{ env.DOCKER_GREEN_IMAGE }}:latest
            ${{ env.DOCKER_GREEN_IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/phantasm
            git pull origin main
            echo 'DOCKERHUB_USER=${{ secrets.DOCKERHUB_USER }}' > .env
            docker pull ${{ env.DOCKER_BLUE_IMAGE }}:latest
            docker pull ${{ env.DOCKER_GREEN_IMAGE }}:latest
            docker compose up -d --no-deps blue-app green-app
            docker image prune -f
            echo 'Deployment complete at $(date)'