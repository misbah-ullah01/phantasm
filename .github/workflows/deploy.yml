name: PHANTASM CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKERHUB_USER: ${{ vars.DOCKERHUB_USER }}
  DOCKER_BLUE_IMAGE: ${{ vars.DOCKERHUB_USER }}/phantasm-blue
  DOCKER_GREEN_IMAGE: ${{ vars.DOCKERHUB_USER }}/phantasm-green

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push blue image
        uses: docker/build-push-action@v6
        with:
          context: ./app/v1
          push: true
          tags: |
            ${{ env.DOCKER_BLUE_IMAGE }}:latest
            ${{ env.DOCKER_BLUE_IMAGE }}:${{ github.sha }}

      - name: Build and push green image
        uses: docker/build-push-action@v6
        with:
          context: ./app/v2
          push: true
          tags: |
            ${{ env.DOCKER_GREEN_IMAGE }}:latest
            ${{ env.DOCKER_GREEN_IMAGE }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/phantasm || cd /opt/phantasm
            git pull origin main
            docker compose pull blue-app green-app
            docker compose up -d --no-deps blue-app green-app
            docker image prune -f
